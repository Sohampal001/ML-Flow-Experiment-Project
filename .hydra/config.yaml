experiment:
  name: xgboost_logistic
  tracking_uri: file:./mlruns
dataset:
  raw_path: xgboost_project/data/raw/winequality-red.csv
  processed_path: xgboost_project/data/preprocessed/winequality-red-preprocessed.csv
  train_path: xgboost_project/data/preprocessed/winequality-red-preprocessed_train.csv
  test_path: xgboost_project/data/preprocessed/winequality-red-preprocessed_test.csv
  target: quality
  test_size: 0.2
  random_state: 42
model:
  type: XGBoost
params:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  c: 0.1
  l1_ratio: 0.5
  penalty: elasticnet
  eval_metric: logloss
  solver: saga
  max_iter: 1000
