experiment:
  name: XGBoost_Logistic
  tracking_uri: file:./mlruns
dataset:
  raw_path: D:/ml_flow_project/XGBoost_Logistic/data/raw/winequality-red.csv
  train_path: D:/ml_flow_project/XGBoost_Logistic/data/preprocessed/train.csv
  test_path: D:/ml_flow_project/XGBoost_Logistic/data/preprocessed/test.csv
  target: quality_label
  test_size: 0.2
  random_state: 42
model:
  type: logistic_regression
params:
  c: 0.2
  l1_ratio: 0.5
  penalty: elasticnet
  solver: saga
  max_iter: 1000
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: logloss
  random_state: 42
  kernel: rbf
  gamma: scale
