experiment:
  name: "{{cookiecutter.project_name}}"
  tracking_uri: "file:./mlruns"

dataset:
  raw_path: "path_of_raw_data"
  tarin_path: "path_of_train_data"
  test_path: "path_of_test_data"
  target: "target_colum_name"
  test_size: 0.2
  random_state: 42

model:
  type: "model"

params:

  c: 1.0
  l1_ratio: 0.5
  penalty: "elasticnet"
  solver: "saga"
  max_iter: 1000

 
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: "logloss"

 
  random_state: 42

  kernel: "rbf"
  gamma: "scale"